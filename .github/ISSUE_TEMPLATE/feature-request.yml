name: Feature request
description: Got an idea or something you wish the app could do? Tell us here.
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to share your idea! You don't need to be technical — just describe what you'd like in plain language.

  - type: textarea
    id: what
    attributes:
      label: What would you like?
      description: Describe the feature or improvement you have in mind.
      placeholder: e.g. "I'd like to see a way to add a message when I send credit, so the other person knows what it's for."
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why would this be useful?
      description: How would this help you or your community? (Optional, but helpful.)
      placeholder: e.g. "Right now I have to message separately to explain the context."

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, sketches, or anything else that might help us understand. (Optional.)
